<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Task Tracker">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Task Tracker</title>
<style>
  :root {
    --bg: #0e0e10;
    --surface: #1a1a1e;
    --surface2: #242428;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f2;
    --text2: #8e8e96;
    --text3: #55555e;
    --accent: #a78bfa;
    --accent-bg: rgba(167,139,250,0.12);
    --danger: #f87171;
    --danger-bg: rgba(248,113,113,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; }
  body { display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }

  /* safe area */
  .top-safe { height: env(safe-area-inset-top, 0px); }
  .bot-safe { height: calc(env(safe-area-inset-bottom, 0px) + 60px); flex-shrink: 0; }

  /* tab bar */
  .tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: rgba(14,14,16,0.92); backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--border);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    z-index: 100;
  }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 10px 0 8px; border: none; background: transparent; cursor: pointer;
    color: var(--text3); font-size: 10px; font-weight: 500; letter-spacing: .02em; transition: color .15s; }
  .tab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .tab.active { color: var(--accent); }

  /* scroll area */
  .pages { flex: 1; overflow: hidden; }
  .page { display: none; height: 100vh; overflow-y: auto; padding: 0 16px 0; -webkit-overflow-scrolling: touch; }
  .page.active { display: block; }
  .page-inner { padding-top: 20px; padding-bottom: 20px; }

  /* active banner */
  .active-banner {
    background: var(--accent-bg); border: 0.5px solid rgba(167,139,250,0.3);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px;
    display: none; align-items: center; gap: 10px;
  }
  .active-banner.show { display: flex; }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }
  .active-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--accent); }
  .active-time { font-size: 14px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; }

  /* card */
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
  .card-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; padding: 14px 16px 0; }

  /* task rows */
  .task-row { display: flex; align-items: center; gap: 10px; padding: 13px 16px; border-bottom: 0.5px solid var(--border); }
  .task-row:last-child { border-bottom: none; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .task-name { flex: 1; font-size: 15px; font-weight: 500; color: var(--text); }
  .task-today { font-size: 13px; color: var(--text2); min-width: 44px; text-align: right; }
  .play-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 0.5px solid var(--border2);
    background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s;
  }
  .play-btn svg { width: 16px; height: 16px; stroke: var(--text2); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; transition: stroke .15s; }
  .play-btn:active { transform: scale(.92); }
  .play-btn.running { background: var(--danger-bg); border-color: rgba(248,113,113,.3); }
  .play-btn.running svg { stroke: var(--danger); }

  /* add row */
  .add-row { display: flex; gap: 8px; padding: 10px 16px 14px; }
  .add-row input {
    flex: 1; background: var(--surface2); border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); padding: 0 12px; height: 38px; color: var(--text);
    font-size: 14px; outline: none;
  }
  .add-row input::placeholder { color: var(--text3); }
  .add-row input:focus { border-color: var(--accent); }
  .add-btn {
    width: 38px; height: 38px; border-radius: var(--radius-sm); border: none;
    background: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .add-btn svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; }
  .add-btn:active { opacity: .8; }

  /* stat cards */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .stat-val { font-size: 24px; font-weight: 600; color: var(--text); }

  /* seg ctrl */
  .seg-ctrl { display: flex; gap: 3px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 12px; }
  .seg { flex: 1; padding: 7px; border: none; background: transparent; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all .15s; }
  .seg.active { background: var(--surface2); color: var(--text); }

  /* date nav */
  .date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .date-nav-label { font-size: 15px; font-weight: 600; color: var(--text); }
  .nav-btn { width: 32px; height: 32px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .nav-btn svg { width: 16px; height: 16px; stroke: var(--text2); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .nav-btn:active { opacity: .7; }

  /* bar chart */
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 140px; padding-bottom: 22px; position: relative; margin: 14px 16px 0; }
  .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 4px; height: 100%; }
  .bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; }
  .bar { width: 100%; border-radius: 5px 5px 0 0; transition: height .35s cubic-bezier(.34,1.3,.7,1); min-height: 3px; }
  .bar-lbl { font-size: 10px; color: var(--text3); text-align: center; overflow: hidden; max-width: 100%; white-space: nowrap; text-overflow: ellipsis; }
  .no-chart { display: flex; align-items: center; justify-content: center; height: 120px; font-size: 13px; color: var(--text3); }

  /* legend */
  .legend { display: flex; flex-wrap: wrap; gap: 8px 16px; padding: 10px 16px 14px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }

  /* session list */
  .session-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; border-bottom: 0.5px solid var(--border); }
  .session-row:last-child { border-bottom: none; }
  .session-task { font-size: 14px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .session-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .session-dur { font-size: 14px; font-weight: 600; color: var(--text2); }

  /* export row */
  .export-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .btn { flex: 1; height: 40px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .btn:active { opacity: .7; }
  .btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .btn.danger { color: var(--danger); border-color: rgba(248,113,113,.25); }

  /* manage */
  .icon-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .icon-btn svg { width: 16px; height: 16px; stroke: var(--text3); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .icon-btn:active { background: var(--surface2); }
  .icon-btn.danger svg { stroke: var(--danger); }
  .name-edit { flex: 1; font-size: 15px; font-weight: 500; background: transparent; border: none; border-bottom: 1.5px solid var(--accent); color: var(--text); outline: none; padding: 2px 0; }

  .no-data { text-align: center; padding: 32px; font-size: 14px; color: var(--text3); }

  /* modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
  .modal-backdrop.show { display: flex; }
  .modal { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 24px 20px 20px; width: 100%; max-width: 320px; }
  .modal-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .modal-desc { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; height: 42px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface2); color: var(--text2); font-size: 14px; font-weight: 500; cursor: pointer; }
  .modal-btns button.confirm { background: var(--danger-bg); border-color: rgba(248,113,113,.3); color: var(--danger); }
  .modal-btns button:active { opacity: .7; }
</style>
</head>
<body>
<div class="top-safe"></div>

<div class="pages">
  <!-- TRACKER -->
  <div class="page active" id="page-tracker">
    <div class="page-inner">
      <div class="active-banner" id="active-banner">
        <div class="pulse"></div>
        <span class="active-name" id="active-name"></span>
        <span class="active-time" id="active-time">00:00</span>
      </div>
      <div class="card">
        <div class="card-label">오늘의 태스크</div>
        <div id="task-list"></div>
        <div style="padding:10px 16px 14px;border-top:0.5px solid var(--border);margin-top:2px">
          <div style="font-size:12px;color:var(--text3);text-align:center">관리 탭에서 태스크를 추가하세요</div>
        </div>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="page" id="page-stats">
    <div class="page-inner">
      <div class="seg-ctrl">
        <button class="seg active" onclick="setP('day')">일별</button>
        <button class="seg" onclick="setP('month')">월별</button>
        <button class="seg" onclick="setP('year')">연별</button>
      </div>
      <div class="date-nav">
        <button class="nav-btn" onclick="nav(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
        <span class="date-nav-label" id="period-label"></span>
        <button class="nav-btn" onclick="nav(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <div class="stat-grid" id="stat-grid"></div>
      <div class="card">
        <div class="card-label" style="padding-bottom:0">태스크별</div>
        <div id="bar-chart-wrap"></div>
        <div class="legend" id="legend"></div>
      </div>
      <div class="card">
        <div class="card-label">세션 기록</div>
        <div id="session-list"></div>
      </div>
    </div>
  </div>

  <!-- MANAGE -->
  <div class="page" id="page-manage">
    <div class="page-inner">
      <div class="card">
        <div class="card-label">태스크 목록</div>
        <div id="manage-list"></div>
        <div class="add-row">
          <input type="text" id="new-input" placeholder="새 태스크 이름" maxlength="20" onkeydown="if(event.key==='Enter')addTask()">
          <button class="add-btn" onclick="addTask()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
      </div>
      <div class="card">
        <div class="card-label">백업</div>
        <div class="task-row" style="border-bottom:none">
          <span class="task-name" style="font-size:14px;font-weight:400">기록 내보내기</span>
          <button class="btn" style="flex:0;padding:0 14px;height:34px;font-size:13px" onclick="exp('csv')"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> CSV</button>
          <button class="btn" style="flex:0;padding:0 14px;height:34px;font-size:13px" onclick="exp('json')"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> JSON</button>
        </div>
      </div>
      <div class="card">
        <div class="card-label">데이터 관리</div>
        <div class="task-row" style="border-bottom:none">
          <span class="task-name" style="font-size:14px;font-weight:400">모든 기록 삭제</span>
          <button class="icon-btn danger" onclick="showDeleteModal()" aria-label="데이터 삭제"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="bot-safe"></div>

<!-- SESSION DELETE MODAL -->
<div class="modal-backdrop" id="session-delete-modal">
  <div class="modal">
    <div class="modal-title">기록 삭제</div>
    <div class="modal-desc">이 기록을 삭제할까요?<br>이 작업은 되돌릴 수 없습니다.</div>
    <div class="modal-btns">
      <button onclick="hideSessionDeleteModal()">취소</button>
      <button class="confirm" onclick="confirmSessionDelete()">확인</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-backdrop" id="delete-modal">
  <div class="modal">
    <div class="modal-title">데이터 삭제</div>
    <div class="modal-desc">모든 기록 데이터가 삭제됩니다.<br>이 작업은 되돌릴 수 없습니다.</div>
    <div class="modal-btns">
      <button onclick="hideDeleteModal()">취소</button>
      <button class="confirm" onclick="confirmDelete()">확인</button>
    </div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab active" id="tab-tracker" onclick="showPage('tracker')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    타이머
  </button>
  <button class="tab" id="tab-stats" onclick="showPage('stats')">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    통계
  </button>
  <button class="tab" id="tab-manage" onclick="showPage('manage')">
    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    관리
  </button>
</div>

<script>
const COLORS=['#a78bfa','#34d399','#fb923c','#60a5fa','#f472b6','#a3e635','#fbbf24','#f87171','#94a3b8'];
let S={tasks:[],sessions:[],activeId:null,activeStart:null};
let period='day', offset=0, tick=null;

function save(){try{localStorage.setItem('ttr2',JSON.stringify(S))}catch(e){}}
function load(){
  try{const d=localStorage.getItem('ttr2');if(d)S=JSON.parse(d);}catch(e){}
  if(!S.tasks||!S.tasks.length) S={tasks:[{id:'t1',name:'공부',color:COLORS[0]},{id:'t2',name:'운동',color:COLORS[1]},{id:'t3',name:'독서',color:COLORS[2]}],sessions:[],activeId:null,activeStart:null};
}

const fmtMs=ms=>{const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);return h>0?h+'h '+String(m%60).padStart(2,'0')+'m':String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0')};
const fmtHM=ms=>{const m=Math.round(ms/60000),h=Math.floor(m/60);return h>0?h+'h '+(m%60)+'m':m+'m'};
const fmtT=ts=>{const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')};
const dKey=ts=>{const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
const mKey=ts=>{const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')};
const yKey=ts=>String(new Date(ts).getFullYear());
const tName=id=>(S.tasks.find(t=>t.id===id)||{name:'삭제됨'}).name;
const tColor=id=>(S.tasks.find(t=>t.id===id)||{color:'#555'}).color;

function renderTracker(){
  const today=dKey(Date.now());
  const tots={};
  S.sessions.filter(s=>dKey(s.start)===today).forEach(s=>tots[s.taskId]=(tots[s.taskId]||0)+s.dur);
  let html=S.tasks.map(t=>{
    const run=S.activeId===t.id;
    return `<div class="task-row">
      <div class="dot" style="background:${t.color}"></div>
      <span class="task-name">${t.name}</span>
      <span class="task-today">${tots[t.id]?fmtHM(tots[t.id]):''}</span>
      <button class="play-btn${run?' running':''}" onclick="toggle('${t.id}')">
        ${run
          ?'<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
          :'<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>'}
      </button>
    </div>`;
  }).join('');
  if(!html) html='<div class="no-data">관리 탭에서 태스크를 추가하세요</div>';
  document.getElementById('task-list').innerHTML=html;
  const banner=document.getElementById('active-banner');
  if(S.activeId){banner.classList.add('show');document.getElementById('active-name').textContent=tName(S.activeId);}
  else banner.classList.remove('show');
}

function toggle(id){
  const now=Date.now();
  if(S.activeId===id){
    S.sessions.push({id:'s'+now,taskId:id,start:S.activeStart,end:now,dur:now-S.activeStart});
    S.activeId=null;S.activeStart=null;
    clearInterval(tick);tick=null;
  } else {
    if(S.activeId) S.sessions.push({id:'s'+now,taskId:S.activeId,start:S.activeStart,end:now,dur:now-S.activeStart});
    S.activeId=id;S.activeStart=now;
    clearInterval(tick);
    tick=setInterval(()=>{document.getElementById('active-time').textContent=fmtMs(Date.now()-S.activeStart);},1000);
  }
  save();renderTracker();
}

function getPSessions(){
  const now=new Date();
  if(period==='day'){const d=new Date(now);d.setDate(d.getDate()+offset);const k=dKey(d);return S.sessions.filter(s=>dKey(s.start)===k);}
  if(period==='month'){const d=new Date(now.getFullYear(),now.getMonth()+offset,1);const k=mKey(d);return S.sessions.filter(s=>mKey(s.start)===k);}
  const y=now.getFullYear()+offset;return S.sessions.filter(s=>yKey(s.start)===String(y));
}

function getPLabel(){
  const now=new Date();
  if(period==='day'){const d=new Date(now);d.setDate(d.getDate()+offset);if(offset===0)return '오늘';if(offset===-1)return '어제';return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;}
  if(period==='month'){const d=new Date(now.getFullYear(),now.getMonth()+offset,1);return `${d.getFullYear()}년 ${d.getMonth()+1}월`;}
  return `${now.getFullYear()+offset}년`;
}

function renderStats(){
  document.getElementById('period-label').textContent=getPLabel();
  const ss=getPSessions();
  const tots={};ss.forEach(s=>tots[s.taskId]=(tots[s.taskId]||0)+s.dur);
  const total=ss.reduce((a,s)=>a+s.dur,0);
  document.getElementById('stat-grid').innerHTML=`
    <div class="stat-card"><div class="stat-lbl">총 시간</div><div class="stat-val">${fmtHM(total)||'0m'}</div></div>
    <div class="stat-card"><div class="stat-lbl">세션 수</div><div class="stat-val">${ss.length}</div></div>`;

  const ids=Object.keys(tots).sort((a,b)=>tots[b]-tots[a]);
  const maxMs=Math.max(...ids.map(id=>tots[id]),1);
  let bars=ids.map(id=>`<div class="bar-col">
    <div class="bar-wrap"><div class="bar" style="height:${Math.round(tots[id]/maxMs*100)}%;background:${tColor(id)}"></div></div>
    <div class="bar-lbl">${tName(id).slice(0,4)}</div>
  </div>`).join('');
  document.getElementById('bar-chart-wrap').innerHTML=bars?`<div class="bar-chart">${bars}</div>`:'<div class="no-chart">기록 없음</div>';
  document.getElementById('legend').innerHTML=ids.map(id=>`<div class="legend-item"><div class="dot" style="background:${tColor(id)};width:8px;height:8px"></div>${tName(id)} ${fmtHM(tots[id])}</div>`).join('');

  const sorted=[...ss].sort((a,b)=>b.start-a.start);
  document.getElementById('session-list').innerHTML=sorted.slice(0,30).map(s=>`<div class="session-row">
    <div><div class="session-task"><div class="dot" style="background:${tColor(s.taskId)};width:7px;height:7px"></div>${tName(s.taskId)}</div>
    <div class="session-meta">${dKey(s.start)} ${fmtT(s.start)} ~ ${fmtT(s.end)}</div></div>
    <div style="display:flex;align-items:center;gap:6px"><div class="session-dur">${fmtHM(s.dur)}</div><button class="icon-btn danger" onclick="showSessionDeleteModal('${s.id}')" aria-label="세션 삭제"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button></div>
  </div>`).join('')||'<div class="no-data">기록 없음</div>';
}

function renderManage(){
  document.getElementById('manage-list').innerHTML=S.tasks.map(t=>`<div class="task-row" id="mr_${t.id}">
    <div class="dot" style="background:${t.color}"></div>
    <span class="task-name" id="tn_${t.id}">${t.name}</span>
    <button class="icon-btn" onclick="startEdit('${t.id}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
    <button class="icon-btn danger" onclick="delTask('${t.id}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
  </div>`).join('')||'<div class="no-data">태스크가 없습니다</div>';
}

function startEdit(id){
  const el=document.getElementById('tn_'+id);
  const cur=el.textContent;
  const inp=document.createElement('input');
  inp.className='name-edit';inp.value=cur;inp.maxLength=20;
  el.replaceWith(inp);inp.focus();
  const finish=()=>{const t=S.tasks.find(x=>x.id===id);if(t&&inp.value.trim())t.name=inp.value.trim();save();renderManage();renderTracker();};
  inp.addEventListener('blur',finish);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur();}});
}

function addTask(){
  const inp=document.getElementById('new-input');
  const name=inp.value.trim();if(!name)return;
  S.tasks.push({id:'t'+Date.now(),name,color:COLORS[S.tasks.length%COLORS.length]});
  inp.value='';save();renderManage();renderTracker();
}

function delTask(id){
  if(S.activeId===id)toggle(id);
  S.tasks=S.tasks.filter(t=>t.id!==id);save();renderManage();renderTracker();
}

function setP(p){period=p;offset=0;document.querySelectorAll('.seg').forEach((b,i)=>b.classList.toggle('active',['day','month','year'][i]===p));renderStats();}
function nav(d){offset+=d;renderStats();}

function exp(fmt){
  if(!S.sessions.length){alert('내보낼 기록이 없습니다');return;}
  let content,type,ext;
  if(fmt==='csv'){
    const rows=[['세션ID','태스크','시작','종료','시간(분)'],...S.sessions.map(s=>[s.id,tName(s.taskId),new Date(s.start).toLocaleString('ko-KR'),new Date(s.end).toLocaleString('ko-KR'),Math.round(s.dur/60000)])];
    content=rows.map(r=>r.join(',')).join('\n');type='text/csv';ext='csv';
  } else {
    content=JSON.stringify(S.sessions.map(s=>({id:s.id,task:tName(s.taskId),start:new Date(s.start).toISOString(),end:new Date(s.end).toISOString(),durationMin:Math.round(s.dur/60000)})),null,2);
    type='application/json';ext='json';
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=`time-log-${new Date().toISOString().slice(0,10)}.${ext}`;a.click();
}

function showDeleteModal(){document.getElementById('delete-modal').classList.add('show');}
function hideDeleteModal(){document.getElementById('delete-modal').classList.remove('show');}
function confirmDelete(){
  S.sessions=[];save();hideDeleteModal();renderStats();renderTracker();
}

let pendingSessionId=null;
function showSessionDeleteModal(id){pendingSessionId=id;document.getElementById('session-delete-modal').classList.add('show');}
function hideSessionDeleteModal(){pendingSessionId=null;document.getElementById('session-delete-modal').classList.remove('show');}
function confirmSessionDelete(){
  if(pendingSessionId) S.sessions=S.sessions.filter(s=>s.id!==pendingSessionId);
  save();hideSessionDeleteModal();renderStats();renderTracker();
}

function showPage(name){
  ['tracker','stats','manage'].forEach(n=>{
    document.getElementById('page-'+n).classList.toggle('active',n===name);
    document.getElementById('tab-'+n).classList.toggle('active',n===name);
  });
  if(name==='stats')renderStats();
  if(name==='manage')renderManage();
}

load();
if(S.activeId&&S.activeStart){
  tick=setInterval(()=>{document.getElementById('active-time').textContent=fmtMs(Date.now()-S.activeStart);},1000);
}
renderTracker();renderManage();
</script>
</body>
</html>
