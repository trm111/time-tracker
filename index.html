
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.app{max-width:420px;margin:0 auto;padding:1rem}
.tab-bar{display:flex;gap:4px;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:4px;margin-bottom:1.25rem}
.tab{flex:1;padding:8px;border:none;background:transparent;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.tab.active{background:var(--color-background-primary);color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary)}
.page{display:none}.page.active{display:block}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem}
.task-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.task-row:last-child{border-bottom:none}
.task-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.task-name{flex:1;font-size:15px;font-weight:500;color:var(--color-text-primary)}
.task-name-edit{flex:1;font-size:15px;font-weight:500;border:none;background:transparent;color:var(--color-text-primary);outline:none;border-bottom:1.5px solid var(--color-border-primary)}
.task-time{font-size:13px;color:var(--color-text-secondary);min-width:48px;text-align:right}
.btn-icon{border:none;background:transparent;cursor:pointer;color:var(--color-text-secondary);padding:4px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px}
.btn-icon:hover{background:var(--color-background-secondary)}
.play-btn{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--color-text-primary);transition:all .15s;flex-shrink:0}
.play-btn.running{background:var(--color-background-danger);border-color:var(--color-border-danger);color:var(--color-text-danger)}
.timer-display{font-size:13px;color:var(--color-text-secondary);min-width:54px;text-align:right}
.section-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.6rem}
.active-banner{background:var(--color-background-info);border:0.5px solid var(--color-border-info);border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:.75rem;display:none;align-items:center;gap:8px}
.active-banner.show{display:flex}
.active-dot{width:8px;height:8px;border-radius:50%;background:var(--color-text-info);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.active-name{flex:1;font-size:14px;font-weight:500;color:var(--color-text-info)}
.active-timer{font-size:14px;font-weight:500;color:var(--color-text-info)}
.add-row{display:flex;gap:8px;margin-top:.75rem}
.add-row input{flex:1}
.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:.75rem}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.seg-ctrl{display:flex;gap:4px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:3px;margin-bottom:1rem}
.seg{flex:1;padding:6px;border:none;background:transparent;border-radius:6px;font-size:13px;color:var(--color-text-secondary);cursor:pointer;font-weight:500}
.seg.active{background:var(--color-background-primary);color:var(--color-text-primary)}
.chart-wrap{position:relative;height:180px;margin-bottom:1rem}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:160px;padding:0 0 24px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px;height:100%}
.bar-inner{width:100%;display:flex;flex-direction:column;justify-content:flex-end;flex:1}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .3s;min-height:2px}
.bar-label{font-size:10px;color:var(--color-text-secondary);text-align:center;white-space:nowrap}
.legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-bottom:1rem}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.session-list{margin-top:.5rem}
.session-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.session-item:last-child{border-bottom:none}
.session-task{font-weight:500;color:var(--color-text-primary)}
.session-meta{color:var(--color-text-secondary)}
.no-data{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:14px}
.export-row{display:flex;gap:8px;margin-top:.75rem}
.export-row button{flex:1;font-size:13px}
.danger-btn{color:var(--color-text-danger);border-color:var(--color-border-danger)}
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.date-nav span{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.period-sessions{margin-top:.5rem}
.date-group{margin-bottom:1rem}
.date-group-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:4px}
</style>

<h2 class="sr-only">태스크별 시간 기록 앱</h2>
<div class="app">
  <div class="tab-bar">
    <button class="tab active" onclick="showPage('tracker')"><i class="ti ti-player-play" aria-hidden="true"></i> 타이머</button>
    <button class="tab" onclick="showPage('stats')"><i class="ti ti-chart-bar" aria-hidden="true"></i> 통계</button>
    <button class="tab" onclick="showPage('manage')"><i class="ti ti-settings" aria-hidden="true"></i> 관리</button>
  </div>

  <div id="page-tracker" class="page active">
    <div class="active-banner" id="active-banner">
      <div class="active-dot"></div>
      <span class="active-name" id="active-name"></span>
      <span class="active-timer" id="active-timer-top">00:00</span>
    </div>
    <div class="card">
      <div class="section-label">오늘의 태스크</div>
      <div id="task-list"></div>
    </div>
  </div>

  <div id="page-stats" class="page">
    <div class="seg-ctrl">
      <button class="seg active" onclick="setStatPeriod('day')">일별</button>
      <button class="seg" onclick="setStatPeriod('month')">월별</button>
      <button class="seg" onclick="setStatPeriod('year')">연별</button>
    </div>
    <div class="date-nav">
      <button class="btn-icon" onclick="navPeriod(-1)"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
      <span id="period-label"></span>
      <button class="btn-icon" onclick="navPeriod(1)"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
    </div>
    <div class="stat-grid" id="stat-grid"></div>
    <div class="card">
      <div class="section-label">태스크별</div>
      <div class="chart-wrap"><div class="bar-chart" id="bar-chart"></div></div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="card">
      <div class="section-label">세션 기록</div>
      <div id="session-list"></div>
    </div>
    <div class="export-row">
      <button onclick="exportData('csv')"><i class="ti ti-download" aria-hidden="true"></i> CSV</button>
      <button onclick="exportData('json')"><i class="ti ti-download" aria-hidden="true"></i> JSON</button>
      <button class="danger-btn" onclick="clearPeriodData()"><i class="ti ti-trash" aria-hidden="true"></i> 삭제</button>
    </div>
  </div>

  <div id="page-manage" class="page">
    <div class="card">
      <div class="section-label">태스크 목록</div>
      <div id="manage-list"></div>
      <div class="add-row">
        <input type="text" id="new-task-input" placeholder="새 태스크 이름" maxlength="20" onkeydown="if(event.key==='Enter')addTask()">
        <button onclick="addTask()"><i class="ti ti-plus" aria-hidden="true"></i> 추가</button>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS=['#7F77DD','#1D9E75','#D85A30','#378ADD','#D4537E','#639922','#BA7517','#E24B4A','#888780'];
let state={tasks:[],sessions:[],activeTaskId:null,activeStart:null,activeElapsed:0};
let timerInterval=null;
let statPeriod='day';
let periodOffset=0;

function save(){localStorage.setItem('ttr_v1',JSON.stringify(state))}
function load(){
  try{const d=localStorage.getItem('ttr_v1');if(d)state=JSON.parse(d);}catch(e){}
  if(!state.tasks||!state.tasks.length){
    state={tasks:[{id:'t1',name:'공부',color:COLORS[0]},{id:'t2',name:'운동',color:COLORS[1]},{id:'t3',name:'독서',color:COLORS[2]}],sessions:[],activeTaskId:null,activeStart:null,activeElapsed:0};
  }
}

function fmtMs(ms){
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  if(h>0)return h+'h '+String(m%60).padStart(2,'0')+'m';
  return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
function fmtHM(ms){
  const m=Math.round(ms/60000),h=Math.floor(m/60);
  if(h>0)return h+'h '+String(m%60).padStart(2,'0')+'m';
  return m+'m';
}
function fmtTime(ts){
  const d=new Date(ts);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function dateKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function monthKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function yearKey(ts){return String(new Date(ts).getFullYear())}

function todayKey(){return dateKey(Date.now())}
function getTaskColor(id){const t=state.tasks.find(x=>x.id===id);return t?t.color:COLORS[8]}
function getTaskName(id){const t=state.tasks.find(x=>x.id===id);return t?t.name:'삭제된 태스크'}

function renderTracker(){
  const today=todayKey();
  const todaySessions=state.sessions.filter(s=>dateKey(s.start)===today);
  const taskTotals={};
  todaySessions.forEach(s=>{taskTotals[s.taskId]=(taskTotals[s.taskId]||0)+s.dur});

  let html='';
  state.tasks.forEach(t=>{
    const isActive=state.activeTaskId===t.id;
    const total=taskTotals[t.id]||0;
    html+=`<div class="task-row">
      <div class="task-dot" style="background:${t.color}"></div>
      <span class="task-name">${t.name}</span>
      <span class="task-time">${total>0?fmtHM(total):''}</span>
      <button class="play-btn ${isActive?'running':''}" onclick="toggleTask('${t.id}')" aria-label="${isActive?'정지':'시작'}">
        <i class="ti ${isActive?'ti-player-stop':'ti-player-play'}" aria-hidden="true"></i>
      </button>
    </div>`;
  });
  if(!state.tasks.length)html='<div class="no-data">관리 탭에서 태스크를 추가하세요</div>';
  document.getElementById('task-list').innerHTML=html;

  const banner=document.getElementById('active-banner');
  if(state.activeTaskId){
    banner.classList.add('show');
    document.getElementById('active-name').textContent=getTaskName(state.activeTaskId);
  } else {
    banner.classList.remove('show');
  }
}

function toggleTask(id){
  const now=Date.now();
  if(state.activeTaskId===id){
    const dur=now-state.activeStart;
    state.sessions.push({id:'s'+now,taskId:id,start:state.activeStart,end:now,dur});
    state.activeTaskId=null;state.activeStart=null;state.activeElapsed=0;
    clearInterval(timerInterval);timerInterval=null;
  } else {
    if(state.activeTaskId){
      const dur=now-state.activeStart;
      state.sessions.push({id:'s'+now,taskId:state.activeTaskId,start:state.activeStart,end:now,dur});
    }
    state.activeTaskId=id;state.activeStart=now;state.activeElapsed=0;
    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
      state.activeElapsed=Date.now()-state.activeStart;
      document.getElementById('active-timer-top').textContent=fmtMs(state.activeElapsed);
    },1000);
  }
  save();renderTracker();
}

function getPeriodSessions(){
  const now=new Date();
  if(statPeriod==='day'){
    const d=new Date(now);d.setDate(d.getDate()+periodOffset);
    const key=dateKey(d.getTime());
    return state.sessions.filter(s=>dateKey(s.start)===key);
  } else if(statPeriod==='month'){
    const d=new Date(now.getFullYear(),now.getMonth()+periodOffset,1);
    const key=monthKey(d.getTime());
    return state.sessions.filter(s=>monthKey(s.start)===key);
  } else {
    const y=now.getFullYear()+periodOffset;
    return state.sessions.filter(s=>yearKey(s.start)===String(y));
  }
}

function getPeriodLabel(){
  const now=new Date();
  if(statPeriod==='day'){
    const d=new Date(now);d.setDate(d.getDate()+periodOffset);
    if(periodOffset===0)return '오늘';
    if(periodOffset===-1)return '어제';
    return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
  } else if(statPeriod==='month'){
    const d=new Date(now.getFullYear(),now.getMonth()+periodOffset,1);
    return `${d.getFullYear()}년 ${d.getMonth()+1}월`;
  } else {
    return `${now.getFullYear()+periodOffset}년`;
  }
}

function renderStats(){
  const sessions=getPeriodSessions();
  document.getElementById('period-label').textContent=getPeriodLabel();

  const taskTotals={};
  sessions.forEach(s=>{taskTotals[s.taskId]=(taskTotals[s.taskId]||0)+s.dur});
  const totalMs=sessions.reduce((a,s)=>a+s.dur,0);
  const days=[...new Set(sessions.map(s=>dateKey(s.start)))].length||1;

  document.getElementById('stat-grid').innerHTML=`
    <div class="stat-card"><div class="stat-label">총 시간</div><div class="stat-val">${fmtHM(totalMs)||'0m'}</div></div>
    <div class="stat-card"><div class="stat-label">세션 수</div><div class="stat-val">${sessions.length}</div></div>`;

  const taskIds=Object.keys(taskTotals).sort((a,b)=>taskTotals[b]-taskTotals[a]);
  const maxMs=Math.max(...taskIds.map(id=>taskTotals[id]),1);

  let bars='';
  taskIds.forEach(id=>{
    const pct=Math.round((taskTotals[id]/maxMs)*100);
    bars+=`<div class="bar-col">
      <div class="bar-inner"><div class="bar" style="height:${pct}%;background:${getTaskColor(id)}"></div></div>
      <div class="bar-label">${getTaskName(id).slice(0,4)}</div>
    </div>`;
  });
  if(!bars)bars='<div class="no-data" style="width:100%">기록 없음</div>';
  document.getElementById('bar-chart').innerHTML=bars;

  let legend='';
  taskIds.forEach(id=>{
    legend+=`<div class="legend-item"><div class="legend-dot" style="background:${getTaskColor(id)}"></div>${getTaskName(id)} ${fmtHM(taskTotals[id])}</div>`;
  });
  document.getElementById('legend').innerHTML=legend;

  const sorted=[...sessions].sort((a,b)=>b.start-a.start);
  let slist='';
  sorted.slice(0,20).forEach(s=>{
    const d=new Date(s.start);
    slist+=`<div class="session-item">
      <div>
        <div class="session-task" style="display:flex;align-items:center;gap:5px"><div class="task-dot" style="background:${getTaskColor(s.taskId)};width:7px;height:7px"></div>${getTaskName(s.taskId)}</div>
        <div class="session-meta">${dateKey(s.start)} ${fmtTime(s.start)}~${fmtTime(s.end)}</div>
      </div>
      <div style="font-size:13px;font-weight:500;color:var(--color-text-primary)">${fmtHM(s.dur)}</div>
    </div>`;
  });
  document.getElementById('session-list').innerHTML=slist||'<div class="no-data">기록 없음</div>';
}

function renderManage(){
  let html='';
  state.tasks.forEach((t,i)=>{
    html+=`<div class="task-row" id="mr_${t.id}">
      <div class="task-dot" style="background:${t.color}"></div>
      <span class="task-name" id="tn_${t.id}">${t.name}</span>
      <button class="btn-icon" onclick="startEdit('${t.id}')" aria-label="이름 변경"><i class="ti ti-edit" aria-hidden="true"></i></button>
      <button class="btn-icon" onclick="deleteTask('${t.id}')" aria-label="삭제"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`;
  });
  document.getElementById('manage-list').innerHTML=html||'<div class="no-data">태스크가 없습니다</div>';
}

function startEdit(id){
  const el=document.getElementById('tn_'+id);
  const cur=el.textContent;
  const inp=document.createElement('input');
  inp.className='task-name-edit';inp.value=cur;inp.maxLength=20;
  el.replaceWith(inp);inp.focus();
  inp.addEventListener('blur',()=>finishEdit(id,inp));
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur();}});
}
function finishEdit(id,inp){
  const t=state.tasks.find(x=>x.id===id);
  if(t&&inp.value.trim())t.name=inp.value.trim();
  save();renderManage();renderTracker();
}

function addTask(){
  const inp=document.getElementById('new-task-input');
  const name=inp.value.trim();
  if(!name)return;
  const id='t'+Date.now();
  const color=COLORS[state.tasks.length%COLORS.length];
  state.tasks.push({id,name,color});
  inp.value='';save();renderManage();renderTracker();
}

function deleteTask(id){
  if(state.activeTaskId===id){toggleTask(id);}
  state.tasks=state.tasks.filter(t=>t.id!==id);
  save();renderManage();renderTracker();
}

function setStatPeriod(p){
  statPeriod=p;periodOffset=0;
  document.querySelectorAll('.seg').forEach((b,i)=>{b.classList.toggle('active',['day','month','year'][i]===p)});
  renderStats();
}
function navPeriod(d){periodOffset+=d;renderStats();}

function exportData(fmt){
  const sessions=getPeriodSessions();
  if(!sessions.length){alert('기간 내 기록이 없습니다');return;}
  let content,type,ext;
  if(fmt==='csv'){
    const rows=[['세션ID','태스크','시작','종료','시간(분)']];
    sessions.forEach(s=>rows.push([s.id,getTaskName(s.taskId),new Date(s.start).toLocaleString('ko-KR'),new Date(s.end).toLocaleString('ko-KR'),Math.round(s.dur/60000)]));
    content=rows.map(r=>r.join(',')).join('\n');type='text/csv';ext='csv';
  } else {
    const out=sessions.map(s=>({id:s.id,task:getTaskName(s.taskId),start:new Date(s.start).toISOString(),end:new Date(s.end).toISOString(),durationMin:Math.round(s.dur/60000)}));
    content=JSON.stringify(out,null,2);type='application/json';ext='json';
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=`time-log-${getPeriodLabel().replace(/[^0-9가-힣]/g,'')}.${ext}`;
  a.click();
}

function clearPeriodData(){
  const label=getPeriodLabel();
  if(!confirm(`${label} 기록을 모두 삭제할까요?`))return;
  const sessions=getPeriodSessions();
  const ids=new Set(sessions.map(s=>s.id));
  state.sessions=state.sessions.filter(s=>!ids.has(s.id));
  save();renderStats();
}

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const idx={tracker:0,stats:1,manage:2}[name];
  document.querySelectorAll('.tab')[idx].classList.add('active');
  if(name==='stats')renderStats();
  if(name==='manage')renderManage();
}

load();
if(state.activeTaskId&&state.activeStart){
  state.activeElapsed=Date.now()-state.activeStart;
  timerInterval=setInterval(()=>{
    state.activeElapsed=Date.now()-state.activeStart;
    document.getElementById('active-timer-top').textContent=fmtMs(state.activeElapsed);
  },1000);
}
renderTracker();renderManage();
</script>
